# =============================================================================
# OSGi Feature Launcher - Environment Configuration (HTTP Installer)
#
# This file can be sourced to set environment variables for the launcher.
# Override values by setting them before sourcing, or create /etc/osgitech/env.conf
# =============================================================================

# Paths
export OSGITECH_REPO_DIR="${OSGITECH_REPO_DIR:-/app/storage/repo}"
export OSGITECH_BOOTSTRAP_FEATURE="${OSGITECH_BOOTSTRAP_FEATURE:-/app/bootstrap/bootstrap.json}"

# JVM Configuration
export JAVA_OPTS="${JAVA_OPTS:-}"
export JAVA_HEAP_MAX="${JAVA_HEAP_MAX:-}"

# Repository Configuration
export OSGITECH_USE_DEFAULT_REPOS="${OSGITECH_USE_DEFAULT_REPOS:-true}"
export OSGITECH_EXTRA_REPOS="${OSGITECH_EXTRA_REPOS:-}"

# HTTP Installer Configuration
export OSGITECH_HTTP_FEATURES_URL="${OSGITECH_HTTP_FEATURES_URL:-}"
export OSGITECH_HTTP_SCAN_MODE="${OSGITECH_HTTP_SCAN_MODE:-ONCE}"
export OSGITECH_HTTP_SCAN_INTERVAL="${OSGITECH_HTTP_SCAN_INTERVAL:-300}"
export OSGITECH_HTTP_CONNECT_TIMEOUT="${OSGITECH_HTTP_CONNECT_TIMEOUT:-30}"
export OSGITECH_HTTP_REQUEST_TIMEOUT="${OSGITECH_HTTP_REQUEST_TIMEOUT:-60}"
export OSGITECH_HTTP_SERVER_ID="${OSGITECH_HTTP_SERVER_ID:-}"
