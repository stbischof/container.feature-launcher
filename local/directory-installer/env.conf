# =============================================================================
# OSGi Feature Launcher - Environment Configuration (Directory Installer)
#
# This file can be sourced to set environment variables for the launcher.
# Override values by setting them before sourcing, or create /etc/osgitech/env.conf
# =============================================================================

# Paths
export OSGITECH_REPO_DIR="${OSGITECH_REPO_DIR:-/app/storage/repo}"
export OSGITECH_BOOTSTRAP_FEATURE="${OSGITECH_BOOTSTRAP_FEATURE:-/app/bootstrap/bootstrap.json}"

# JVM Configuration
export JAVA_OPTS="${JAVA_OPTS:-}"
export JAVA_HEAP_MAX="${JAVA_HEAP_MAX:-}"

# Feature Artifacts
export OSGITECH_INITIAL_CONTENT_DIR="${OSGITECH_INITIAL_CONTENT_DIR:-/app/initial-content-load}"

# Directory Installer Configuration
export OSGITECH_DIR_INSTALLER_FEATURES_DIR="${OSGITECH_DIR_INSTALLER_FEATURES_DIR:-/app/storage/features}"
export OSGITECH_DIR_INSTALLER_REPO_DIR="${OSGITECH_DIR_INSTALLER_REPO_DIR:-/app/storage/repo}"
export OSGITECH_DIR_INSTALLER_SCAN_MODE="${OSGITECH_DIR_INSTALLER_SCAN_MODE:-ONCE}"
export OSGITECH_DIR_INSTALLER_SCAN_INTERVAL="${OSGITECH_DIR_INSTALLER_SCAN_INTERVAL:-300}"
